<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dataTables.min.css') }}">



    <style>
        body {
            margin:0;
            background:#f4f6f9;
            font-family: Arial, sans-serif;
        }

        /* ================= SIDEBAR ================= */

        .sidebar {
            width:250px;
            height:100vh;
            position:fixed;
            background-color: #0B3C5D;
            color:white;
            transition: all 0.3s ease;
            overflow-x:hidden;
        }

        .sidebar.collapsed {
            width:70px;
        }
        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .profile-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s ease;
        }

        .profile-info span {
            font-weight: bold;
        }

        .profile-info small {
            color: #cfd8dc;
        }

        .sidebar h4 {
            padding: 20px;
            text-align: center;
            border-bottom:1px solid #4A6572;
        }

        .sidebar a {
            display:flex;
            align-items:center;
            gap:10px;
            padding:14px 20px;
            color: #FFFFFF;
            text-decoration: none;
            border-bottom:1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            font-size:14px;
        }

        .sidebar a i {
            font-size:18px;
        }

        .sidebar a:hover {
            background-color: #4A6572;
        }

        .sidebar a.active {
            background-color: #9AA5B1;
            color:#0B3C5D;
            font-weight:bold;
        }

        .sidebar.collapsed a span {
            display:none;
        }

        .sidebar.collapsed h4 span {
            display:none;
        }

        .sidebar.collapsed .profile-img:hover {
            transform: scale(1.1);
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: #FFFFFF;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .menu-link:hover {
            background-color: #4A6572;
        }
        .menu-link.active {
            background: #4A6572;
            border-left: 4px solid #FFFFFF;
        }

        /* ================= MAIN ================= */

        .main {
            margin-left:250px;
            padding:20px;
            transition: all 0.3s ease;
        }

        .main.expanded {
            margin-left:70px;
        }

        /* ================= NAVBAR ================= */

        .navbar-custom {
            background-color: #0B3C5D;
        }

        .toggle-btn {
            background:none;
            border:none;
            color:white;
            font-size:20px;
            margin-right:15px;
        }

        /* ================= CARD ================= */

        .card {
            background-color: #FFFFFF;
            border: 1px solid #9AA5B1;
        }

        /* ================= FOOTER ================= */

        .footer {
            text-align:center;
            padding:10px;
            background-color: #0B3C5D;
            color: #FFFFFF;
            margin-top:30px;
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">
    <div class="sidebar-profile">
        <img src="/static/images/person.png" class="profile-img">
        <div class="profile-info">
            <span id="profileName"></span>
            <small id="profileRole"></small>
        </div>
    </div>

    <div id="sidebarMenu"></div>
</div>

<!-- ================= MAIN ================= -->

<div class="main" id="mainContent">

    <nav class="navbar navbar-dark navbar-custom mb-4">
        <div class="container-fluid">
            <button class="toggle-btn" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>

            <span class="navbar-brand">Performance Monitoring System</span>

            <div class="text-white">
                <span id="usernameDisplay"></span>
                <button id="logoutBtn" class="btn btn-light btn-sm ms-3">Logout</button>
            </div>

        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="footer">
        <small>
            © 2026 Performance Monitoring System
        </small>

    </footer>

</div>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
        document.getElementById("mainContent").classList.toggle("expanded");
    }


</script>


<script type="module" src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='js/base.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/jquery-4.0.0.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/dataTables.min.js') }}"></script>

</body>
</html>
