{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<style>
    .dashboard-card {
        border: none;
        border-radius: 16px;
        overflow: hidden;
        transition: all .3s ease;
        height: 100%;
        background: #fff;
    }

    .dashboard-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, .08);
    }

    .dashboard-header {
        background: #ffffff;
        border-bottom: 1px solid #edf2f7;
        font-weight: 600;
        font-size: 15px;
        padding: 16px 20px;
    }

    .avatar-circle{
        width:40px;
        height:40px;
        border-radius:50%;
        background:#0B3C5D;
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:14px;
        font-weight:600;
    }

    .table tbody tr:hover{
        background:#f8fbff;
    }

    .addBtn {
        background: #0B3C5D;
        color: #FFFFFF;
        border: none;
        font-weight: 500;
        transition: 0.2s;
    }
    .addBtn:hover {
        background: #092f48;
        color: #FFFFFF;
    }
</style>

    <div class="container-fluid">

    <!-- Header -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                
                <div>
                    <h3 class="fw-bold mb-1">
                        User Management
                    </h3>

                    <small class="text-muted">
                        Manage employee accounts and access permissions
                    </small>
                </div>

                <button class="btn addBtn" id="addbtn">
                    <i class="bi bi-plus-circle me-2"></i>
                    Add New User
                </button>

            </div>
        </div>
    </div>

   
    <div class="card border-0 shadow-sm dashboard-card mb-4">
        <div class="card-body">

            <div class="row g-3">
                <div class="col-lg-4">
                    <input
                        type="text"
                        id="searchUser"
                        class="form-control"
                        placeholder="Search by name or email">
                </div>

                <div class="col-lg-3">
                    <select id="role" class="form-select">
                            <option value="">Select Role</option>
                        </select>
                </div>

                <div class="col-lg-3">
                   <select id="statusFilter" class="form-select">
                        <option value="">Select Status</option>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>

                <div class="col-lg-2">
                    <button class="btn btn-outline-primary w-100" id="filterBtn">
                        Filter
                    </button>
                </div>
            </div>

        </div>
    </div>

   
    <div class="card shadow-sm dashboard-card">
        <div class="card-header dashboard-header d-flex justify-content-between align-items-center">

            <span>
                User List
            </span>

            <span class="badge bg-primary">
                <span id="totalUsers">0</span> Users
            </span>

        </div>

        <div class="card-body">
            <div class="table-responsive">
                <table id="userTable" class="table table-striped table-hover table-bordered text-center align-middle w-100">
                    <thead>
                        <tr>
                            <th class="text-center">User</th>
                            <th class="text-center" >Email</th>
                            <th class="text-center" >Role</th>
                            <th class="text-center" >Status</th>
                            <th class="text-center" >Actions</th>
                        </tr>
                    </thead>
                </table>

            </div>
        </div>
    </div>
</div>

<script type="module" src="{{ url_for('static', filename='js/userManagement.js') }}"></script>

{% endblock %}
